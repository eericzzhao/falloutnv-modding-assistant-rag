services:
  # 1. The FastAPI Backend
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env 

  # 2. The Vanilla Frontend
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/style.css:/usr/share/nginx/html/style.css
      - ./frontend/app.js:/usr/share/nginx/html/app.js
    depends_on:
      - backend

