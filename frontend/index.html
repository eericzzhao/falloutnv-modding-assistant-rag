<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBCO FNVMA Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body class="crt">
    <div class="terminal-container">
        <header class="terminal-header">
            <h1>ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM</h1>
            <p>COPYRIGHT 2077 ROBCO INDUSTRIES</p>
            <p>-Server 1- FNV RAG Diagnostic Node</p>
        </header>

        <main class="terminal-content">
            <section id="chat-zone">
                <div id="output-log">
                </div>
                <form class="input-line" id="chat-form">
                    <span class="prompt">></span>
                    <input type="text" id="user-input" placeholder="Take a sip of your Vault-Tec Canteen..." autocomplete="off" autofocus>
                    <button type="submit" id="send-btn">[ENTER]</button>
                </form>
            </section>

            <section id="diagnostic-zone">
                <div id="d3-container" style="width: 100%; height: 300px; border:1px solid var(--robco-green); margin-top: 200px;">
                    <svg id="rag-visualizer" width="100%" height="100%"></svg>
                </div>
                <div id="d3-tooltip" style="position: absolute; opacity: 0; background: var(--robco-dark); border:1px solid var(--robco-green); color: var(--robco-green); padding: 10px; pointer-events: none; max-width: 250px; font-size: 0.85rem; z-index: 10; box-shadow: 0 0 5px var(--robco-green);"></div>
                <div class="drop-zone" id="drop-zone">
                    <p>> DRAG AND DROP LOARDORDER.TXT HERE</p>
                    <input type="file" id="file-input" accept=".txt" hidden>
                </div>
                <div id="diagnostic-results"></div>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
