name: Sync to Hugging Face Space

on:
  push:
    branches: [master] # Or 'master', depending on your default branch

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required to push full history to new remote
          lfs: true # downloads the actual LFS files

      - name: Fetch ALL historical LFS files
        run: git lfs fetch --all # forces github to download all historical versions of the lfs files before pushing so hf knows where the reference is coming from

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://eericzzhao:$HF_TOKEN@huggingface.co/spaces/eericzzhao/fnv-rag-backend master:main